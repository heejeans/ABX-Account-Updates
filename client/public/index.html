<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CloudZero · ABX Tier Review</title>
    <style>
      :root {
        --sf-brand:      #0070d2;
        --sf-brand-dark: #005fb2;
        --sf-nav-bg:     #032d60;
        --sf-bg:         #f3f2f1;
        --sf-card-bg:    #ffffff;
        --sf-border:     #dddbda;
        --sf-text:       #080707;
        --sf-text-weak:  #706e6b;
        --sf-text-label: #3e3e3c;
        --sf-success:    #04844b;
        --sf-error:      #c23934;
        --sf-warning:    #dd7a01;
        --sf-purple:     #9050e9;
        --sf-radius:     4px;
        --sf-shadow:     0 2px 4px 0 rgba(0,0,0,.16);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Salesforce Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 13px;
        color: var(--sf-text);
        background: var(--sf-bg);
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
