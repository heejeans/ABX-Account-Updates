<template>
    <div class="abx-tier-review">

        <!-- ── Header ──────────────────────────────────────────────────────── -->
        <div class="slds-page-header slds-m-bottom_small">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span class="slds-page-header__title slds-truncate">
                                            CloudZero · ABX Tier Review
                                        </span>
                                    </h1>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <lightning-button
                                label="Refresh"
                                icon-name="utility:refresh"
                                onclick={handleRefresh}
                                disabled={isLoading}
                            ></lightning-button>
                        </div>
                        <div class="slds-page-header__control">
                            <lightning-button
                                label="Reset"
                                icon-name="utility:undo"
                                onclick={handleReset}
                            ></lightning-button>
                        </div>
                        <template if:true={hasApprovedChanges}>
                            <div class="slds-page-header__control">
                                <lightning-button
                                    variant="brand"
                                    label={applyButtonLabel}
                                    icon-name="utility:check"
                                    onclick={handleApplyChanges}
                                    disabled={isApplying}
                                ></lightning-button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Loading spinner ─────────────────────────────────────────────── -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:true={hasAccounts}>
            <!-- ── Tabs ────────────────────────────────────────────────────── -->
            <lightning-tabset variant="scoped" active-tab-value={activeTab} onactive={handleTabChange}>

                <!-- ══ REVIEW TAB ══════════════════════════════════════════ -->
                <lightning-tab label="Review" value="review">

                    <!-- Stats Bar -->
                    <c-abx-stats-bar
                        stats={stats}
                        active-filter={activeFilter}
                        onfilterchange={handleStatClick}
                    ></c-abx-stats-bar>

                    <!-- Reason sub-filter pills -->
                    <template if:true={hasReasonGroups}>
                        <div class="slds-m-vertical_x-small slds-p-horizontal_medium reason-pills">
                            <template for:each={reasonGroups} for:item="rg">
                                <span
                                    key={rg.label}
                                    class={rg.cssClass}
                                    data-reason={rg.label}
                                    onclick={handleReasonClick}
                                    style="cursor: pointer;"
                                >
                                    {rg.label} ({rg.count})
                                </span>
                            </template>
                        </div>
                    </template>

                    <!-- Toolbar: search, field filters, bulk actions -->
                    <div class="slds-grid slds-grid_align-spread slds-p-horizontal_medium slds-m-bottom_x-small toolbar">
                        <div class="slds-col slds-grid slds-grid_vertical-align-center">
                            <template if:true={showSelectAll}>
                                <lightning-input
                                    type="checkbox"
                                    variant="label-hidden"
                                    label="Select all"
                                    checked={allSelected}
                                    onchange={handleSelectAll}
                                    class="slds-m-right_x-small"
                                ></lightning-input>
                            </template>
                            <span class="slds-text-body_small slds-text-color_weak slds-m-right_small">
                                Showing {filteredCount} accounts
                            </span>
                            <template if:true={hasSelection}>
                                <template if:true={isActionableFilter}>
                                    <lightning-button-group class="slds-m-left_x-small">
                                        <lightning-button
                                            label="Approve Selected"
                                            variant="success"
                                            onclick={handleApproveSelected}
                                        ></lightning-button>
                                        <lightning-button
                                            label="Reject Selected"
                                            variant="destructive"
                                            onclick={handleRejectSelected}
                                        ></lightning-button>
                                    </lightning-button-group>
                                </template>
                                <!-- Bulk AE Assignment -->
                                <div class="slds-is-relative slds-m-left_x-small">
                                    <lightning-button
                                        label="Assign AE"
                                        icon-name="utility:user"
                                        variant="neutral"
                                        onclick={handleBulkAEClick}
                                        class="bulk-ae-btn"
                                    ></lightning-button>
                                    <template if:true={bulkAEPickerOpen}>
                                        <div class="ae-bulk-panel slds-box slds-theme_default">
                                            <p class="slds-text-body_small slds-m-bottom_x-small">
                                                Assign AE to <strong>{selectedCount}</strong> selected accounts:
                                            </p>
                                            <input
                                                type="text"
                                                class="slds-input slds-m-bottom_x-small"
                                                placeholder="Search AE users…"
                                                value={bulkAESearchTerm}
                                                oninput={handleBulkAESearch}
                                            />
                                            <div class="ae-bulk-list">
                                                <template for:each={filteredBulkAEUsers} for:item="aeUser">
                                                    <div
                                                        key={aeUser.userId}
                                                        class="ae-dropdown-item"
                                                        data-user-id={aeUser.userId}
                                                        onclick={handleBulkAESelect}
                                                    >
                                                        {aeUser.name}
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <div class="slds-col slds-grid slds-grid_vertical-align-center">
                            <!-- Field Filter button -->
                            <div class="slds-is-relative slds-m-right_x-small">
                                <lightning-button
                                    label={filterButtonLabel}
                                    icon-name="utility:filterList"
                                    variant={filterButtonVariant}
                                    onclick={handleToggleFilterPanel}
                                    class="filter-toggle-btn"
                                ></lightning-button>
                                <template if:true={hasActiveFieldFilters}>
                                    <lightning-button
                                        label="Clear"
                                        variant="base"
                                        onclick={handleClearFieldFilters}
                                        class="slds-m-left_xx-small"
                                    ></lightning-button>
                                </template>

                                <!-- Filter dropdown panel -->
                                <template if:true={filterPanelOpen}>
                                    <div class="filter-panel slds-box slds-theme_default">
                                        <div class="filter-panel__inner slds-grid">
                                            <!-- Left: categories -->
                                            <div class="filter-panel__cats">
                                                <template for:each={filterCategories} for:item="cat">
                                                    <div
                                                        key={cat.key}
                                                        class={cat.catClass}
                                                        data-key={cat.key}
                                                        onclick={handleFilterCategoryClick}
                                                    >
                                                        {cat.label}
                                                        <template if:true={cat.hasSelections}>
                                                            <span class="filter-cat__dot"></span>
                                                        </template>
                                                        <template if:true={cat.isDynamic}>
                                                            <span class="filter-cat__remove" data-key={cat.key} onclick={handleRemoveDynamicFilter}>&times;</span>
                                                        </template>
                                                    </div>
                                                </template>
                                                <!-- Add dynamic field button -->
                                                <div class="filter-cat filter-cat--add" onclick={handleToggleDynamicFieldPicker}>
                                                    + Add Field
                                                </div>
                                                <template if:true={showDynamicFieldPicker}>
                                                    <div class="dynamic-field-picker">
                                                        <input
                                                            type="text"
                                                            class="slds-input slds-m-bottom_xx-small"
                                                            placeholder="Search fields…"
                                                            value={dynamicFieldSearchTerm}
                                                            oninput={handleDynamicFieldSearch}
                                                        />
                                                        <div class="dynamic-field-picker__list">
                                                            <template for:each={filteredFieldDescribe} for:item="fd">
                                                                <div
                                                                    key={fd.apiName}
                                                                    class="dynamic-field-item"
                                                                    data-api-name={fd.apiName}
                                                                    onclick={handleAddDynamicFilter}
                                                                >
                                                                    <span class="dynamic-field-item__label">{fd.label}</span>
                                                                    <span class="dynamic-field-item__api">{fd.apiName}</span>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                            <!-- Right: values -->
                                            <div class="filter-panel__vals">
                                                <template for:each={activeFilterValues} for:item="fv">
                                                    <label key={fv.value} class="filter-value">
                                                        <input
                                                            type="checkbox"
                                                            checked={fv.checked}
                                                            data-value={fv.value}
                                                            onchange={handleFilterValueToggle}
                                                        />
                                                        <span class="filter-value__label">{fv.label}</span>
                                                        <span class="filter-value__count">({fv.count})</span>
                                                    </label>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <lightning-input
                                type="search"
                                placeholder="Search by account name…"
                                value={searchTerm}
                                onchange={handleSearchChange}
                                variant="label-hidden"
                                label="Search"
                                class="search-input"
                            ></lightning-input>
                        </div>
                    </div>

                    <!-- Account cards -->
                    <div class="slds-p-horizontal_medium account-list">
                        <template for:each={datatableRows} for:item="row">
                            <div key={row.id} class="slds-box slds-m-bottom_xx-small account-card">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <!-- Checkbox (selectable rows: actionable or Unassigned AE) -->
                                    <template if:true={row.isSelectable}>
                                        <lightning-input
                                            type="checkbox"
                                            variant="label-hidden"
                                            label="Select"
                                            checked={row.isSelected}
                                            data-id={row.id}
                                            onchange={handleToggleSelect}
                                            class="slds-m-right_x-small"
                                        ></lightning-input>
                                    </template>

                                    <!-- Account info -->
                                    <div class="slds-col slds-grow">
                                        <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_xxx-small">
                                            <a href={row.accountUrl} class="slds-text-link slds-m-right_x-small account-name">
                                                {row.name}
                                            </a>
                                            <span class={row.actionClass}>{row.action}</span>
                                            <template if:true={row.isApproved}>
                                                <span class="slds-badge slds-theme_success slds-m-left_xx-small">✓ Approved</span>
                                            </template>
                                            <template if:true={row.isRejected}>
                                                <span class="slds-badge slds-theme_error slds-m-left_xx-small">✕ Rejected</span>
                                            </template>
                                        </div>
                                        <div class="slds-text-body_small slds-text-color_weak meta-row">
                                            <span>Fit: {row.fitScoreDisplay}</span>
                                            <span class="slds-m-left_small">Intent: {row.intentDisplay}</span>
                                            <span class="slds-m-left_small">Stage: {row.stageDisplay}</span>
                                            <span class="slds-m-left_small">DNN: {row.dnnDisplay}</span>
                                            <template if:true={row.currentTier}>
                                                <span class="slds-m-left_small">Current: {row.currentTier}</span>
                                            </template>
                                            <template if:true={row.recommendedTier}>
                                                <span class="slds-m-left_small">Rec: {row.recommendedTier}</span>
                                            </template>
                                            <template if:true={row.aeTerritoryDisplay}>
                                                <span class="slds-m-left_small">Territory: {row.aeTerritoryDisplay}</span>
                                            </template>
                                            <template if:true={row.hasAE}>
                                                <span class="slds-m-left_small">AE: {row.accountExecutiveName}</span>
                                            </template>
                                            <template if:false={row.hasAE}>
                                                <span class="slds-m-left_small ae-unassigned-badge">No AE</span>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Actions -->
                                    <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center">
                                        <template if:true={row.isActionable}>
                                            <lightning-button-group>
                                                <lightning-button
                                                    label="Approve"
                                                    variant="success"
                                                    data-id={row.id}
                                                    onclick={handleApprove}
                                                ></lightning-button>
                                                <lightning-button
                                                    label="Reject"
                                                    variant="destructive"
                                                    data-id={row.id}
                                                    onclick={handleReject}
                                                ></lightning-button>
                                            </lightning-button-group>
                                        </template>
                                        <template if:true={row.isApproved}>
                                            <lightning-button
                                                label="Undo"
                                                icon-name="utility:undo"
                                                data-id={row.id}
                                                onclick={handleUndoDecision}
                                            ></lightning-button>
                                        </template>
                                        <template if:true={row.isRejected}>
                                            <lightning-button
                                                label="Undo"
                                                icon-name="utility:undo"
                                                data-id={row.id}
                                                onclick={handleUndoDecision}
                                            ></lightning-button>
                                        </template>
                                        <lightning-button-icon
                                            icon-name="utility:chevrondown"
                                            alternative-text="Details"
                                            variant="border-filled"
                                            class="slds-m-left_xx-small"
                                            data-id={row.id}
                                            onclick={handleToggleExpand}
                                        ></lightning-button-icon>
                                    </div>
                                </div>

                                <!-- Expandable detail -->
                                <div data-detail-id={row.id} class="slds-hide slds-m-top_x-small slds-p-top_x-small slds-border_top">
                                    <p class="slds-text-body_small"><strong>Reason:</strong> {row.reason}</p>
                                    <template if:true={row.showRuleGroup}>
                                        <p class="slds-text-body_small slds-m-top_xxx-small"><strong>Rule group:</strong> {row.ruleGroup}</p>
                                    </template>
                                    <template if:true={row.segment}>
                                        <p class="slds-text-body_small slds-m-top_xxx-small"><strong>Segment:</strong> {row.segment}</p>
                                    </template>
                                    <template if:true={row.hasDevOwner}>
                                        <p class="slds-text-body_small slds-m-top_xxx-small"><strong>Account Dev Owner:</strong> {row.accountDevOwnerName}</p>
                                    </template>

                                    <!-- Dynamic Detail Fields -->
                                    <template if:true={row.hasDynamicDetails}>
                                        <template for:each={row.dynamicDetails} for:item="dd">
                                            <p key={dd.key} class="slds-text-body_small slds-m-top_xxx-small">
                                                <strong>{dd.label}:</strong> {dd.value}
                                                <span class="dynamic-detail-remove" data-key={dd.key} onclick={handleRemoveDetailField}>&times;</span>
                                            </p>
                                        </template>
                                    </template>
                                    <!-- Add Detail Field button -->
                                    <div class="slds-m-top_xx-small slds-is-relative">
                                        <span class="detail-add-field-btn" onclick={handleToggleDetailFieldPicker}>+ Add Field</span>
                                        <template if:true={showDetailFieldPicker}>
                                            <div class="detail-field-picker">
                                                <input
                                                    type="text"
                                                    class="slds-input slds-m-bottom_xx-small"
                                                    placeholder="Search fields…"
                                                    value={detailFieldSearchTerm}
                                                    oninput={handleDetailFieldSearch}
                                                />
                                                <div class="detail-field-picker__list">
                                                    <template for:each={filteredDetailFieldDescribe} for:item="dfd">
                                                        <div
                                                            key={dfd.apiName}
                                                            class="dynamic-field-item"
                                                            data-api-name={dfd.apiName}
                                                            onclick={handleAddDetailField}
                                                        >
                                                            <span class="dynamic-field-item__label">{dfd.label}</span>
                                                            <span class="dynamic-field-item__api">{dfd.apiName}</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- AE Assignment -->
                                    <div class="ae-assignment-section">
                                        <div class="slds-grid slds-grid_vertical-align-end slds-wrap">
                                            <div class="slds-col">
                                                <label class="slds-form-element__label slds-text-body_small">
                                                    <strong>Account Executive</strong>
                                                </label>
                                                <div class="ae-combobox-wrapper">
                                                    <input
                                                        type="text"
                                                        class="slds-input ae-search-input"
                                                        placeholder="Search AE users…"
                                                        data-id={row.id}
                                                        value={row.aeSearchTerm}
                                                        onfocus={handleAESearchFocus}
                                                        oninput={handleAESearchInput}
                                                    />
                                                    <template if:true={row.showAEDropdown}>
                                                        <div class="ae-dropdown">
                                                            <template if:true={row.filteredAEUsers.length}>
                                                                <template for:each={row.filteredAEUsers} for:item="aeUser">
                                                                    <div
                                                                        key={aeUser.userId}
                                                                        class="ae-dropdown-item"
                                                                        data-id={row.id}
                                                                        data-user-id={aeUser.userId}
                                                                        onmousedown={handleAESelect}
                                                                    >
                                                                        {aeUser.name}
                                                                    </div>
                                                                </template>
                                                            </template>
                                                            <template if:false={row.filteredAEUsers.length}>
                                                                <div class="ae-dropdown-item ae-dropdown-empty">No matching users</div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                            <template if:true={row.hasPendingAE}>
                                                <div class="slds-col slds-m-left_x-small">
                                                    <lightning-button
                                                        label="Save AE"
                                                        variant="brand"
                                                        data-id={row.id}
                                                        onclick={handleSaveAE}
                                                    ></lightning-button>
                                                </div>
                                            </template>
                                            <template if:true={row.hasAE}>
                                                <div class="slds-col slds-m-left_small slds-text-body_small">
                                                    Current: <strong>{row.accountExecutiveName}</strong>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <template if:false={filteredCount}>
                            <div class="slds-align_absolute-center slds-p-around_large slds-text-color_weak">
                                No accounts match the current filters.
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <!-- ══ CAMPAIGN SYNC TAB ═══════════════════════════════════ -->
                <lightning-tab label={campaignTabLabel} value="campaign">
                    <c-abx-campaign-sync
                        accounts={allAccounts}
                        campaign-data={campaignData}
                        approved-ids={approvedIds}
                        rejected-ids={rejectedIds}
                        cp-approved-ids={cpApprovedIds}
                        cp-rejected-ids={cpRejectedIds}
                        oncpapprove={handleCpApprove}
                        oncpreject={handleCpReject}
                        oncpsync={handleCpSync}
                    ></c-abx-campaign-sync>
                </lightning-tab>
            </lightning-tabset>
        </template>
    </div>
</template>
